services:
  eduquest-frontend:
    build: .
    container_name: eduquest-frontend
    environment:
      - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
    networks:
      - eduquest_net

  edujarvis-service:
    build: ./edujarvis-service
    container_name: edujarvis-service
    env_file:
      - .env
    ports:
      - "8001:8001"
    networks:
      - eduquest_net

  correction-engine:
    build: ./correction-engine
    container_name: correction-engine
    env_file:
      - .env
    ports:
      - "8002:8002"
    networks:
      - eduquest_net

networks:
  eduquest_net:
    driver: bridge
